name: DTS dump (bmp_boost)

on: [push, pull_request, workflow_dispatch]

jobs:
  dts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install west
        run: pip3 install --user west

      - name: Install Zephyr SDK 0.16.9
        run: |
          ZSDK_VER=0.16.9
          ZSDK_DIR=$HOME/zephyr-sdk-$ZSDK_VER
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v$ZSDK_VER/zephyr-sdk-$ZSDK_VER_linux-x86_64.tar.xz
          tar -xf zephyr-sdk-$ZSDK_VER_linux-x86_64.tar.xz -C $HOME
          $ZSDK_DIR/setup.sh -t arm-zephyr-eabi -h -c
          echo "ZEPHYR_TOOLCHAIN_VARIANT=zephyr" >> $GITHUB_ENV
          echo "ZEPHYR_SDK_INSTALL_DIR=$ZSDK_DIR" >> $GITHUB_ENV

      - name: Init & update west
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Build settings_reset and grep I2C labels
        run: |
          west build -s zmk/app -d build -b bmp_boost -- \
            -DZMK_CONFIG=$GITHUB_WORKSPACE/config \
            -DSHIELD=settings_reset
          grep -nE "i2c0:|i2c1:|i2c@|xiao_i2c:" build/zephyr/zephyr.dts || true
